name: Quality Gates

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ubuntu-validation:
    name: Ubuntu validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go toolchain
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Node.js runtime
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Linux command-line dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 dnsutils netcat-openbsd gzip coreutils

      - name: Validate example matrix
        run: scripts/ci-structure.sh

      - name: Validate Go examples
        run: scripts/ci-go.sh

      - name: Validate Node.js examples
        run: scripts/ci-node.sh

      - name: Validate Shell Script examples
        run: scripts/ci-shell.sh

      - name: Validate Batch examples
        run: scripts/ci-batch.sh

      - name: Validate PowerShell examples
        run: scripts/ci-powershell.sh

  windows-native-validation:
    name: Windows native smoke tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Batch smoke tests
        shell: cmd
        run: |
          call examples\print.bat
          call examples\functions.bat
          call examples\arrays.bat
          call examples\module_export_usage.bat
          call examples\getter_batch\index.bat bob

      - name: Run PowerShell smoke tests
        shell: pwsh
        run: |
          ./examples/print.ps1
          ./examples/functions.ps1
          ./examples/arrays.ps1
          ./examples/module_export_usage.ps1
          ./examples/getter_powershell/index.ps1 bob
